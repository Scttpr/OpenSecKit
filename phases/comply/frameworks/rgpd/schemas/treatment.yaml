# OpenSecKit V4 - Schéma Traitement RGPD
# Version: 4.0.0
# Usage: Format d'un traitement dans le registre RGPD
# Location: phases/comply/frameworks/rgpd/schemas/treatment.yaml

id: "TRAIT-[NNN]"
nom: "[Nom du traitement]"
description: "[Description courte]"

# Finalités
finalite_principale: "[Pourquoi ces données sont traitées]"
finalites_secondaires: []

# Base légale (Art. 6)
base_legale: "[consentement|contrat|obligation_legale|interets_vitaux|mission_publique|interets_legitimes]"
justification: "[Justification de la base légale]"

# Données
categories_donnees:
  - "[email, nom, adresse, etc.]"
donnees_sensibles: false  # Art. 9
categories_personnes:
  - "[utilisateurs, clients, employés, etc.]"

# Durées
duree_conservation: "[durée]"
criteres_duree: "[Justification de la durée]"

# Destinataires
destinataires_internes:
  - "[service/équipe]"
sous_traitants:
  - nom: "[Nom]"
    finalite: "[Pourquoi]"
    dpa_signe: true|false
transferts_hors_ue:
  - pays: "[Pays]"
    garanties: "[Garanties appliquées]"

# Mesures de sécurité
mesures_techniques:
  - "[chiffrement, pseudonymisation, etc.]"
mesures_organisationnelles:
  - "[contrôle d'accès, formation, etc.]"

# DPIA
dpia_requis: true|false
dpia_reference: "[chemin vers DPIA si existe]"
