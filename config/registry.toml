# OpenSecKit V4 - Registry
# Three-part architecture: Discover → Comply → Secure

[metadata]
version = "4.0.0"
description = "Security as Code - Hub & Spokes Architecture"
repository = "https://github.com/Scttpr/OpenSecKit"
supported_agents = ["claude-code", "copilot", "cursor", "gemini"]
architecture = "hub-and-spokes"

# ════════════════════════════════════════════════════════════════════════════════
# PATHS - Phase-based directory structure (V4)
# ════════════════════════════════════════════════════════════════════════════════

[paths]
phases = "phases"
shared = "shared"

[paths.discover]
root = "phases/discover"
prompts = "phases/discover/prompts"
templates = "phases/discover/templates"

[paths.comply]
root = "phases/comply"
prompts = "phases/comply/prompts"
frameworks = "phases/comply/frameworks"
templates = "phases/comply/templates"

[paths.secure]
root = "phases/secure"
prompts = "phases/secure/prompts"
templates = "phases/secure/templates"
knowledge = "phases/secure/knowledge"

[paths.shared]
schemas = "shared/schemas"
agents = "shared/agents"

# ════════════════════════════════════════════════════════════════════════════════
# PARTS - The three main workflow areas
# ════════════════════════════════════════════════════════════════════════════════

[parts]

[parts.discover]
name = "Discover"
description = "Reality Model - Document existing codebase"
hub = true  # This is the central hub
output = ".osk/system-model/"
commands = ["discover", "discover-validate", "discover-docs"]

[parts.comply]
name = "Comply"
description = "Compliance Assessment - Map to frameworks"
hub = false
consumes = ["system-model"]
output = ".osk/compliance/"
commands = ["comply-rgpd", "comply-rgs", "comply-list", "comply-status"]

[parts.secure]
name = "Secure"
description = "Shift-Left Security - SpecKit-style workflow"
hub = false
consumes = ["system-model"]
output = ".osk/specs/"
commands = ["secure-specify", "secure-clarify", "secure-plan", "secure-tasks", "secure-implement"]

# ════════════════════════════════════════════════════════════════════════════════
# ROLES - Security roles (updated for V4)
# ════════════════════════════════════════════════════════════════════════════════

[roles]

[roles.discovery-analyst]
name = "Discovery Analyst"
description = "System documentation and reality model creation"
part = "discover"
commands = ["discover", "discover-validate", "discover-docs"]

[roles.compliance-analyst]
name = "Compliance Analyst"
description = "Framework compliance assessment and gap analysis"
part = "comply"
commands = ["comply-rgpd", "comply-rgs", "comply-list", "comply-status"]
domains = ["rgpd", "rgs"]

[roles.security-architect]
name = "Security Architect"
description = "Feature security specification and threat modeling"
part = "secure"
commands = ["secure-specify", "secure-clarify"]
principles = ["I", "II", "III"]

[roles.security-engineer]
name = "Security Engineer"
description = "Security planning and implementation"
part = "secure"
commands = ["secure-plan", "secure-tasks", "secure-implement"]
principles = ["IV", "V", "VI", "VII"]

# ════════════════════════════════════════════════════════════════════════════════
# PART 1: DISCOVER - Reality Model Commands
# ════════════════════════════════════════════════════════════════════════════════

[commands.discover]
url = "https://raw.githubusercontent.com/Scttpr/OpenSecKit/main/phases/discover/prompts/discover.md"
version = "4.0.0"
part = "discover"
phase = "discovery"
description = "Build or update system model (adaptive)"
requires = [".osk/config.toml"]
generates = [
    ".osk/system-model/index.yaml",
    ".osk/system-model/business.yaml",
    ".osk/system-model/architecture.yaml",
    ".osk/system-model/data.yaml",
    ".osk/system-model/actors.yaml",
    ".osk/system-model/boundaries.yaml",
    ".osk/system-model/integrations.yaml",
    ".osk/system-model/controls.yaml",
    ".osk/system-model/tooling.yaml",
    ".osk/system-model/team.yaml",
    ".osk/system-model/gaps.yaml"
]
model_sections = []  # Writes all sections
agents = ["claude-code", "copilot", "cursor", "gemini"]
roles = ["discovery-analyst"]

[commands.discover-validate]
url = "https://raw.githubusercontent.com/Scttpr/OpenSecKit/main/phases/discover/prompts/validate.md"
version = "4.0.0"
part = "discover"
phase = "discovery"
description = "Validate system-model (optionally resolve gaps)"
argument = "[--resolve]"
requires = [".osk/system-model/index.yaml"]
generates = []
model_sections = ["index", "gaps"]
agents = ["claude-code", "copilot", "cursor", "gemini"]
roles = ["discovery-analyst"]

[commands.discover-docs]
url = "https://raw.githubusercontent.com/Scttpr/OpenSecKit/main/phases/discover/prompts/docs.md"
version = "4.0.0"
part = "discover"
phase = "discovery"
description = "Generate documentation (audience-specific)"
argument = "[--audience <security|developer|management|compliance>]"
requires = [".osk/system-model/index.yaml"]
generates = ["docs/"]
model_sections = ["index", "business", "architecture", "data", "actors", "boundaries", "integrations", "controls", "tooling", "team", "gaps"]
agents = ["claude-code", "copilot", "cursor", "gemini"]
roles = ["discovery-analyst"]

# ════════════════════════════════════════════════════════════════════════════════
# PART 2: COMPLY - Compliance Assessment Commands
# ════════════════════════════════════════════════════════════════════════════════

[commands.comply-rgpd]
url = "https://raw.githubusercontent.com/Scttpr/OpenSecKit/main/phases/comply/frameworks/rgpd/prompt.md"
version = "4.0.0"
part = "comply"
phase = "compliance"
description = "RGPD/GDPR compliance assessment"
argument = "[audit]"
requires = [".osk/system-model/index.yaml"]
generates = [
    ".osk/compliance/assessment-rgpd.yaml",
    ".osk/compliance/assessment-rgpd.md",
    ".osk/compliance/gap-report-rgpd.md",
    ".osk/compliance/sub-processor-register.md"
]
# --export flag generates: .osk/compliance/exports/rgpd-compliance-report-{date}.md
model_sections = ["index", "data", "actors", "integrations", "tooling", "architecture", "controls", "business", "boundaries"]
domain = "rgpd"
agents = ["claude-code", "copilot", "cursor", "gemini"]
roles = ["compliance-analyst"]

[commands.comply-rgs]
url = "https://raw.githubusercontent.com/Scttpr/OpenSecKit/main/phases/comply/frameworks/rgs/prompt.md"
version = "4.0.0"
part = "comply"
phase = "compliance"
description = "RGS compliance and EBIOS RM"
argument = "[renew]"
requires = [".osk/system-model/index.yaml"]
generates = [
    ".osk/compliance/assessment-rgs.yaml",
    ".osk/compliance/assessment-rgs.md",
    ".osk/compliance/homologation-checklist.md",
    ".osk/compliance/system-perimeter.md"
]
# --export flag generates: .osk/compliance/exports/dossier-homologation-rgs-{date}.md
model_sections = ["index", "architecture", "controls", "data", "integrations", "tooling", "actors", "business", "boundaries"]
domain = "rgs"
agents = ["claude-code", "copilot", "cursor", "gemini"]
roles = ["compliance-analyst"]

[commands.comply-list]
url = "https://raw.githubusercontent.com/Scttpr/OpenSecKit/main/phases/comply/prompts/list.md"
version = "4.0.0"
part = "comply"
phase = "compliance"
description = "List available compliance frameworks"
requires = []
generates = []
model_sections = []
agents = ["claude-code", "copilot", "cursor", "gemini"]
roles = ["compliance-analyst"]

[commands.comply-status]
url = "https://raw.githubusercontent.com/Scttpr/OpenSecKit/main/phases/comply/prompts/status.md"
version = "4.0.0"
part = "comply"
phase = "compliance"
description = "Multi-framework compliance dashboard"
requires = [".osk/compliance/assessment-*.yaml"]
generates = []
model_sections = ["index"]
agents = ["claude-code", "copilot", "cursor", "gemini"]
roles = ["compliance-analyst"]

# ════════════════════════════════════════════════════════════════════════════════
# PART 3: SECURE - Shift-Left Security Commands (SpecKit-style)
# ════════════════════════════════════════════════════════════════════════════════

[commands.secure-specify]
url = "https://raw.githubusercontent.com/Scttpr/OpenSecKit/main/prompts/osk-secure-specify.md"
version = "4.0.0"
part = "secure"
phase = "specify"
description = "Security specification - threats, requirements, testing, hardening"
argument = "feature_name"
requires = [".osk/system-model/index.yaml"]
generates = [
    ".osk/specs/NNN-{feature}/security-spec.md",
    ".osk/specs/NNN-{feature}/risks.yaml"
]
model_sections = ["index", "architecture", "data"]
principles = ["I", "II", "III", "IV", "V", "VI", "VII"]
agents = ["claude-code", "copilot", "cursor", "gemini"]
roles = ["security-architect"]

[commands.secure-clarify]
url = "https://raw.githubusercontent.com/Scttpr/OpenSecKit/main/prompts/osk-secure-clarify.md"
version = "4.0.0"
part = "secure"
phase = "clarify"
description = "Clarify ambiguities and validate assumptions"
argument = "feature_name"
requires = [".osk/specs/NNN-{feature}/security-spec.md"]
generates = [".osk/specs/NNN-{feature}/security-spec.md"]
model_sections = ["index"]
agents = ["claude-code", "copilot", "cursor", "gemini"]
roles = ["security-architect"]

[commands.secure-plan]
url = "https://raw.githubusercontent.com/Scttpr/OpenSecKit/main/prompts/osk-secure-plan.md"
version = "4.0.0"
part = "secure"
phase = "plan"
description = "Consolidated security implementation plan"
argument = "feature_name"
requires = [".osk/specs/NNN-{feature}/security-spec.md"]
generates = [".osk/specs/NNN-{feature}/security-plan.md"]
model_sections = ["index"]
principles = ["I", "II", "III", "IV", "V", "VI", "VII"]
agents = ["claude-code", "copilot", "cursor", "gemini"]
roles = ["security-engineer"]

[commands.secure-tasks]
url = "https://raw.githubusercontent.com/Scttpr/OpenSecKit/main/prompts/osk-secure-tasks.md"
version = "4.0.0"
part = "secure"
phase = "tasks"
description = "Generate ordered tasks with dependencies"
argument = "feature_name"
requires = [".osk/specs/NNN-{feature}/security-plan.md"]
generates = [
    ".osk/specs/NNN-{feature}/security-tasks.md",
    ".osk/specs/NNN-{feature}/tasks.yaml"
]
model_sections = ["index"]
agents = ["claude-code", "copilot", "cursor", "gemini"]
roles = ["security-engineer"]

[commands.secure-implement]
url = "https://raw.githubusercontent.com/Scttpr/OpenSecKit/main/prompts/osk-secure-implement.md"
version = "4.0.0"
part = "secure"
phase = "implement"
description = "Implement tasks and update risk register"
argument = "feature_name"
requires = [".osk/specs/NNN-{feature}/tasks.yaml"]
generates = [
    ".osk/specs/NNN-{feature}/risks.yaml"
]
model_sections = ["index", "architecture"]
principles = ["I", "II", "III", "IV", "V", "VI", "VII"]
agents = ["claude-code", "copilot", "cursor", "gemini"]
roles = ["security-engineer"]

# ════════════════════════════════════════════════════════════════════════════════
# V3 COMPATIBILITY ALIASES
# These redirect V3 commands to V4 equivalents
# ════════════════════════════════════════════════════════════════════════════════

[aliases]
configure = "discover"            # /osk-configure → /osk-discover
baseline = "discover"             # /osk-baseline → /osk-discover
init = "discover"                 # /osk-discover init → /osk-discover
analyze = "secure-specify"        # /osk-analyze → /osk-secure-specify
specify = "secure-specify"        # /osk-specify → /osk-secure-specify
harden = "secure-specify"         # /osk-harden → /osk-secure-specify
plan = "secure-plan"              # /osk-plan → /osk-secure-plan
tasks = "secure-tasks"            # /osk-tasks → /osk-secure-tasks
implement = "secure-implement"    # /osk-implement → /osk-secure-implement
rgpd = "comply-rgpd"              # /osk-rgpd → /osk-comply-rgpd
rgs = "comply-rgs"                # /osk-rgs → /osk-comply-rgs

# ════════════════════════════════════════════════════════════════════════════════
# DOMAINS - Compliance Frameworks
# ════════════════════════════════════════════════════════════════════════════════

[domains]

[domains.rgpd]
name = "RGPD / GDPR"
version = "2016/679"
description = "Règlement Général sur la Protection des Données"
templates_path = "phases/comply/frameworks/rgpd/"
framework_path = "phases/comply/frameworks/rgpd/framework.yaml"
detection_patterns = [
    "user", "email", "password", "address", "phone",
    "date_of_birth", "ip_address", "health", "religion",
    "biometric", "RGPD", "GDPR", "données personnelles"
]
articles = ["Art. 5", "Art. 6", "Art. 25", "Art. 30", "Art. 32", "Art. 33", "Art. 35"]

[domains.rgs]
name = "RGS"
version = "2.0"
description = "Référentiel Général de Sécurité (France)"
templates_path = "phases/comply/frameworks/rgs/"
framework_path = "phases/comply/frameworks/rgs/framework.yaml"
detection_patterns = [
    "gouv.fr", "service-public", "franceconnect",
    "siret", "siren", "administration", "RGS", "ANSSI"
]
levels = ["standard", "renforce", "*"]

# ════════════════════════════════════════════════════════════════════════════════
# PRINCIPLES - The 7 Constitutional Security Principles
# ════════════════════════════════════════════════════════════════════════════════

[principles]

[principles.I]
name = "Threat Modeling"
name_fr = "Modélisation des menaces"
description = "Proactive analysis of attack vectors"
knowledge_path = "knowledge/methodologies/threat-modeling/"
methods = ["STRIDE", "DFD", "Attack Trees"]

[principles.II]
name = "Risk Analysis"
name_fr = "Analyse de risques"
description = "Risk scoring and prioritization"
knowledge_path = "knowledge/methodologies/risk-analysis/"
methods = ["Risk Scoring", "Risk Register"]

[principles.III]
name = "Security by Design"
name_fr = "Sécurité dès la conception"
description = "Security controls from the start"
knowledge_path = "knowledge/methodologies/security-requirements/"
methods = ["OWASP ASVS", "Security Requirements"]

[principles.IV]
name = "Security Testing"
name_fr = "Tests de sécurité"
description = "Automated SAST/DAST/SCA"
knowledge_path = "knowledge/methodologies/security-testing/"
methods = ["SAST", "DAST", "SCA"]

[principles.V]
name = "Secrets Management"
name_fr = "Gestion des secrets"
description = "No secrets in code"
knowledge_path = "knowledge/methodologies/secrets-management/"
methods = ["Vault", "Secret Detection", "Rotation"]

[principles.VI]
name = "Audit Logging"
name_fr = "Traçabilité et audit"
description = "Immutable, centralized logs"
knowledge_path = "knowledge/methodologies/audit-logging/"
methods = ["Structured Logging", "SIEM", "Alerting"]

[principles.VII]
name = "Patch Management"
name_fr = "Patch management"
description = "Strict update SLAs"
knowledge_path = "knowledge/methodologies/patch-management/"
methods = ["SCA", "Dependabot", "SLA"]

# ════════════════════════════════════════════════════════════════════════════════
# WORKFLOW - Phase definitions
# ════════════════════════════════════════════════════════════════════════════════

[workflow]
phases = ["discovery", "compliance", "specify", "clarify", "plan", "tasks", "implement"]

[workflow.discovery]
part = "discover"
commands = ["discover", "discover-validate", "discover-docs"]
description = "Create and maintain the system reality model"

[workflow.compliance]
part = "comply"
commands = ["comply-rgpd", "comply-rgs", "comply-nis2", "comply-iso27001", "comply-soc2", "comply-list", "comply-status"]
description = "Assess compliance against frameworks"

[workflow.specify]
part = "secure"
commands = ["secure-specify"]
description = "Create security specifications"

[workflow.clarify]
part = "secure"
commands = ["secure-clarify"]
description = "Clarify requirements and assumptions"

[workflow.plan]
part = "secure"
commands = ["secure-plan"]
description = "Create implementation plan"

[workflow.tasks]
part = "secure"
commands = ["secure-tasks"]
description = "Generate ordered tasks"

[workflow.implement]
part = "secure"
commands = ["secure-implement"]
description = "Implement and update risk register"
