# OpenSecKit - Schéma Task Entry
# Version: 3.1.0
# Usage: Format d'une tâche atomique

id: "T[NNN]"
titre: "[Titre court actionnable]"
description: "[Description détaillée]"

# Traçabilité
action_source: "P[X]-[NNN]"
phase: "[1-5]"
risques_adresses: ["RISK-XXX"]
exigences_satisfaites: ["AUTH-XXX"]
principe: "[I-VII]"

# Planification
priorite: "[P0-P4]"
effort: "[XS|S|M|L|XL]"
effort_heures: "[X-Y]h"
type: "[setup|config|code|test|doc|review]"

# Dépendances
depends_on: ["T[NNN]"]
blocks: ["T[NNN]"]
parallel_with: ["T[NNN]"]

# Exécution
fichiers_concernes:
  - "[path/to/file]"
instructions: |
  1. [Étape 1]
  2. [Étape 2]
code_exemple: |
  // Exemple si applicable

# Validation
criteres_done:
  - "[Critère vérifiable 1]"
  - "[Critère vérifiable 2]"

# Statut
statut: "[todo|in_progress|blocked|done]"
assignee: ""
