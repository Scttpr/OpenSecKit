# OpenSecKit - Schéma Resolution Entry
# Version: 3.0.1
# Usage: Format de résolution d'un risque

risk_id: "RISK-[FEATURE]-[XXX]"
statut_precedent: "[OUVERT|EN_COURS]"
statut_nouveau: "[EN_COURS|RESOLU|ACCEPTE]"

# Si RESOLU
resolution:
  commit: "[SHA du commit]"
  pr: "[#Numéro PR ou null]"
  description: "[Description de la correction]"
  controles_implementes:
    - "[Contrôle 1]"
    - "[Contrôle 2]"

# Si ACCEPTE
acceptation:
  valideur: "[Nom/Email]"
  date: "[DATE]"
  justification: "[Justification]"
  revue_prevue: "[DATE de re-revue]"

# Dates
dates:
  detection: "[existante]"
  prise_en_charge: "[si EN_COURS]"
  resolution: "[si RESOLU]"

# Workflow
# OUVERT → EN_COURS → RESOLU → VERIFIE
#                  ↘ ACCEPTE
