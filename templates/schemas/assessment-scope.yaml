# OpenSecKit V4 - Assessment Scope Contract
# Version: 4.0.0
# Purpose: Define the structure of assessment scope presented to users
# Usage: Agent prompts use this to present scope for user confirmation

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://openseckit.dev/schemas/assessment-scope-v4.yaml"
title: "Compliance Assessment Scope"
description: "Structure for presenting and recording assessment scope"

type: object
required:
  - framework
  - scope_confirmed
  - data_landscape
  - sub_processors

properties:
  framework:
    type: string
    description: "Framework being assessed"
    examples: ["rgpd", "rgs"]

  scope_confirmed:
    type: boolean
    default: false
    description: "Whether user has confirmed the scope"

  scope_confirmed_date:
    type: string
    format: date-time
    description: "When scope was confirmed"

  # ═══════════════════════════════════════════════════════════════════════════
  # DATA LANDSCAPE (from data.yaml)
  # ═══════════════════════════════════════════════════════════════════════════
  data_landscape:
    type: object
    required:
      - personal_data_categories
      - data_subjects
    properties:
      personal_data_categories:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            sensitivity:
              type: string
              enum: ["standard", "sensitive", "special_category"]
            in_scope:
              type: boolean
              default: true
            exclusion_justification:
              type: string
              description: "Required if in_scope is false"
        description: "Personal data categories from data.yaml"

      data_subjects:
        type: array
        items:
          type: object
          properties:
            type:
              type: string
            count_estimate:
              type: string
            in_scope:
              type: boolean
              default: true
        description: "Types of data subjects"

      processing_activities:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            purpose:
              type: string
            legal_basis:
              type: string
            in_scope:
              type: boolean
              default: true
        description: "Processing activities from data.yaml"

  # ═══════════════════════════════════════════════════════════════════════════
  # SUB-PROCESSORS (from integrations.yaml + tooling.yaml + architecture.yaml)
  # ═══════════════════════════════════════════════════════════════════════════
  sub_processors:
    type: object
    required:
      - integrations
      - tooling
      - infrastructure
    properties:
      integrations:
        type: array
        items:
          $ref: "#/$defs/sub_processor"
        description: "Direct API integrations from integrations.yaml"

      tooling:
        type: array
        items:
          $ref: "#/$defs/sub_processor"
        description: "Operational tools from tooling.yaml"

      infrastructure:
        type: array
        items:
          $ref: "#/$defs/sub_processor"
        description: "Infrastructure providers from architecture.yaml"

  # ═══════════════════════════════════════════════════════════════════════════
  # ACTORS (from actors.yaml)
  # ═══════════════════════════════════════════════════════════════════════════
  actors:
    type: array
    items:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: ["internal", "external", "system"]
        role:
          type: string
        data_access:
          type: array
          items:
            type: string
        in_scope:
          type: boolean
          default: true
    description: "Actors who access data"

  # ═══════════════════════════════════════════════════════════════════════════
  # SECURITY CONTROLS (from security.yaml)
  # ═══════════════════════════════════════════════════════════════════════════
  security_controls:
    type: object
    properties:
      authentication:
        type: object
        properties:
          method:
            type: string
          mfa_enabled:
            type: boolean
          detected_from:
            type: string
            description: "System model path"

      encryption:
        type: object
        properties:
          at_rest:
            type: boolean
          in_transit:
            type: boolean
          algorithms:
            type: array
            items:
              type: string
          detected_from:
            type: string

      logging:
        type: object
        properties:
          centralized:
            type: boolean
          retention_days:
            type: number
          detected_from:
            type: string

  # ═══════════════════════════════════════════════════════════════════════════
  # RGS-SPECIFIC: SECURITY LEVEL
  # ═══════════════════════════════════════════════════════════════════════════
  rgs_level:
    type: string
    enum: ["rgs-star", "rgs-star-star", "rgs-star-star-star"]
    description: "Target RGS security level (RGS assessments only)"

  # ═══════════════════════════════════════════════════════════════════════════
  # SCOPE SUMMARY
  # ═══════════════════════════════════════════════════════════════════════════
  summary:
    type: object
    properties:
      total_data_categories:
        type: number
      total_sub_processors:
        type: number
      total_actors:
        type: number
      has_sensitive_data:
        type: boolean
      has_international_transfers:
        type: boolean
      excluded_items_count:
        type: number
    description: "Quick summary for user confirmation"

# ═══════════════════════════════════════════════════════════════════════════
# SHARED DEFINITIONS
# ═══════════════════════════════════════════════════════════════════════════

$defs:
  sub_processor:
    type: object
    required:
      - id
      - name
      - source
    properties:
      id:
        type: string
        description: "Identifier from system model"
      name:
        type: string
        description: "Service/tool name"
      source:
        type: string
        enum: ["integrations.yaml", "tooling.yaml", "architecture.yaml"]
        description: "Which system model file this came from"
      category:
        type: string
        description: "Type of service"
        examples: ["api", "documentation", "ci_cd", "hosting", "monitoring"]
      location:
        type: string
        description: "Geographic location or jurisdiction"
        examples: ["EU", "US", "UK", "global"]
      is_eu:
        type: boolean
        description: "Whether the service is EU-based"
      dpa_signed:
        type: boolean
        description: "Whether a Data Processing Agreement is in place"
      certifications:
        type: array
        items:
          type: string
        description: "Relevant certifications"
        examples: [["ISO 27001", "SOC 2", "SecNumCloud"]]
      in_scope:
        type: boolean
        default: true
        description: "Whether included in assessment scope"
      in_scope_reason:
        type: string
        description: "Why this is in scope (for user understanding)"
        examples: ["Processes user documentation that may contain personal data references"]
      exclusion_justification:
        type: string
        description: "Required if in_scope is false"
