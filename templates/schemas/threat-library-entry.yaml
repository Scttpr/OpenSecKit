# Threat Library Entry Schema
# Version: 4.0.0
# Used by: knowledge/libraries/threats/*.yaml validation

$schema: "http://json-schema.org/draft-07/schema#"
$id: "https://openseckit.dev/schemas/threat-library-entry.yaml"
title: "Threat Library"
description: "Schema for threat library files containing reusable threat definitions"

type: object
required:
  - metadata
  - threats

properties:
  metadata:
    type: object
    required:
      - library_id
      - name
      - version
    properties:
      library_id:
        type: string
        pattern: "^[a-z0-9-]+$"
        description: "Unique identifier for this library (e.g., 'api-threats')"
      name:
        type: string
        description: "Human-readable library name"
      version:
        type: string
        pattern: "^\\d+\\.\\d+\\.\\d+$"
        description: "Semantic version"
      based_on:
        type: array
        items:
          type: string
        description: "Source standards this library is based on (e.g., 'OWASP API Security Top 10 2023')"

  threats:
    type: array
    items:
      $ref: "#/$defs/ThreatEntry"

$defs:
  ThreatEntry:
    type: object
    required:
      - id
      - name
      - category
      - stride
      - description
      - attack_vector
      - impact
      - likelihood
      - indicators
      - mitigations
    properties:
      id:
        type: string
        pattern: "^[A-Z]+-[A-Z]+-[0-9]+$"
        description: "Unique threat ID (e.g., 'API-BOLA-001')"
      name:
        type: string
        description: "Short threat name"
      category:
        type: string
        enum:
          - authentication
          - authorization
          - injection
          - information_disclosure
          - availability
          - tampering
          - cryptography
          - session
          - configuration
        description: "Threat category"
      stride:
        type: string
        enum:
          - spoofing
          - tampering
          - repudiation
          - information_disclosure
          - denial_of_service
          - elevation_of_privilege
        description: "STRIDE classification"
      owasp_api:
        type: string
        pattern: "^API[0-9]+:[0-9]+$"
        description: "OWASP API Security reference (e.g., 'API1:2023')"
      owasp_web:
        type: string
        description: "OWASP Web Top 10 reference"
      cwe:
        type: string
        pattern: "^CWE-[0-9]+$"
        description: "Common Weakness Enumeration ID"
      capec:
        type: string
        pattern: "^CAPEC-[0-9]+$"
        description: "CAPEC attack pattern ID"
      mitre_attack:
        type: string
        pattern: "^T[0-9]+$"
        description: "MITRE ATT&CK technique ID"
      description:
        type: string
        description: "Detailed threat description"
      attack_vector:
        type: string
        description: "How the attack is performed"
      impact:
        type: string
        description: "Potential business/security impact"
      likelihood:
        type: string
        enum: [high, medium, low]
        description: "Default likelihood if threat applies"
      indicators:
        type: array
        items:
          type: string
        minItems: 1
        description: "Signs that this threat may apply to a feature"
      mitigations:
        type: array
        items:
          type: string
        minItems: 1
        description: "Recommended countermeasures"
