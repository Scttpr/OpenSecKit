# OpenSecKit V4 - System Model Index Schema
# Version: 4.0.0
# Purpose: Lightweight index always loaded by agents
# Usage: .osk/system-model/index.yaml
# Size target: < 200 lines (always fits in context)

metadata:
  schema_version: "4.0.0"
  created_at: "[DATE ISO]"
  last_scan: "[DATE ISO]"
  confidence: 0.85

# ═══════════════════════════════════════════════════════════════════════════════
# QUICK STATS (For agent orientation)
# ═══════════════════════════════════════════════════════════════════════════════

stats:
  components: 0
  data_categories: 0
  actors: 0
  trust_zones: 0
  integrations: 0
  discovery_gaps: 0

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION SUMMARIES (One line per item)
# Agent can decide which sections to load based on these
# ═══════════════════════════════════════════════════════════════════════════════

summaries:
  # Business summary
  business:
    domain: "[e-commerce|healthcare|finance|...]"
    process_count: 0
    processes:
      - id: "BP-001"
        name: "[Process name]"
      # ... max 10 items, then "and N more"

  # Architecture summary
  architecture:
    style: "[monolith|microservices|serverless]"
    component_count: 0
    components:
      - id: "COMP-001"
        name: "[Name]"
        type: "[service|datastore|...]"
      # ... max 10 items

  # Data summary
  data:
    category_count: 0
    pii_fields: 0
    sensitive_categories: 0
    categories:
      - id: "DATA-001"
        name: "[Name]"
        classification: "[personal|sensitive|...]"
      # ... max 10 items

  # Actors summary
  actors:
    user_count: 0
    role_count: 0
    privileged_count: 0
    users:
      - id: "end-user"
        type: "[external|internal]"
      # ... max 10 items

  # Trust boundaries summary
  trust:
    zone_count: 0
    boundary_count: 0
    zones:
      - id: "ZONE-DMZ"
        trust_level: 1
      # ... max 5 items

  # Integrations summary
  integrations:
    count: 0
    without_dpa: 0
    integrations:
      - id: "INT-001"
        name: "[Stripe]"
        type: "[payment|email|...]"
      # ... max 10 items

  # Gaps summary
  gaps:
    total: 0
    critical: 0
    high: 0
    categories:
      - category: "data"
        count: 3
      - category: "security"
        count: 1

# ═══════════════════════════════════════════════════════════════════════════════
# SECTION FILES (For reference)
# ═══════════════════════════════════════════════════════════════════════════════

sections:
  business: "business.yaml"
  architecture: "architecture.yaml"
  data: "data.yaml"
  actors: "actors.yaml"
  trust: "trust.yaml"
  integrations: "integrations.yaml"
  security: "security.yaml"
  gaps: "gaps.yaml"

# ═══════════════════════════════════════════════════════════════════════════════
# CROSS-REFERENCES (Quick lookups)
# ═══════════════════════════════════════════════════════════════════════════════

# Which components handle which data?
component_data_map:
  "COMP-DB": ["DATA-USER", "DATA-ORDER"]
  "COMP-CACHE": ["DATA-SESSION"]

# Which data crosses trust boundaries?
sensitive_flows:
  - data: "DATA-USER"
    crosses: ["TB-INTERNET-DMZ", "TB-DMZ-INTERNAL"]
  - data: "DATA-PAYMENT"
    crosses: ["TB-INTERNET-DMZ"]

# Which integrations handle PII?
pii_integrations:
  - integration: "INT-STRIPE"
    data: ["DATA-PAYMENT"]
  - integration: "INT-SENDGRID"
    data: ["DATA-USER.email"]

# ═══════════════════════════════════════════════════════════════════════════════
# COMPLIANCE HINTS (Quick checks without loading full data)
# ═══════════════════════════════════════════════════════════════════════════════

compliance_hints:
  rgpd:
    has_pii: true
    has_sensitive_data: false
    has_international_transfers: true
    dpia_likely_required: true
  rgs:
    applicable: false
  pci:
    has_payment_data: true
    scope_components: ["COMP-API", "COMP-PAYMENT"]
