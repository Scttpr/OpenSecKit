# OpenSecKit - Schéma Secret Entry
# Version: 3.0.1
# Usage: Format d'un secret dans l'inventaire (Principe V)

id: "SECRET-[FEATURE]-[NNN]"
nom: "[NOM_VARIABLE]"
type: "[api_key|db_credential|token|certificate|encryption_key]"
usage: "[Description de l'usage]"
fichiers:
  - "[Fichier où c'est utilisé]"
sensibilite: "[critical|high|medium]"
rotation_requise: true|false
duree_vie: "[durée recommandée: 24h|30j|90j|1an]"
