# OpenSecKit - Schéma Test Strategy
# Version: 3.0.1
# Usage: Format de la stratégie de tests sécurité (Principe IV)

# SAST - Analyse statique
sast:
  outil: "[Semgrep|SonarQube|CodeQL]"
  integration: "[pre-commit|PR|merge]"
  bloquant: true|false
  seuils:
    critical: 0
    high: 0
    medium: "[configurable]"

# DAST - Analyse dynamique
dast:
  outil: "[OWASP ZAP|Burp|Nuclei]"
  mode: "[baseline|full|api]"
  environnement: "[staging|preview]"
  frequence: "[PR|nightly|weekly]"

# SCA - Analyse composition
sca:
  outil: "[Dependabot|Snyk|Trivy]"
  frequence: "[PR|daily]"
  auto_update:
    patch: true
    minor: "[si tests OK]"
    major: false
  politique:
    cvss_max: "[7.0|8.0|9.0]"
    licences_interdites: ["GPL-3.0", "AGPL"]

# Tests unitaires sécurité
tests_unitaires:
  framework: "[Jest|Pytest|RSpec]"
  couverture_cible: "[80%]"
  types: ["positive", "negative", "boundary"]
