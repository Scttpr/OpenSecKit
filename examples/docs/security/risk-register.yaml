# Registre des risques (liste plate, triée par score résiduel DESC)
risques:
  - id: RISK-LOGIN-001
    titre: "Injection SQL dans endpoint d'authentification"
    description: "Champs email et password non sanitisés, vulnérabilité à l'injection SQL"

    # Classification
    principe_viole: "III. Sécurité dès la conception"
    controle_manquant: "Validation systématique des entrées"
    severite: CRITIQUE  # CRITIQUE | IMPORTANT | MINEUR
    categorie: "Injection"  # OWASP Top 10

    # Scoring
    score_initial: 100
    score_residuel: 100  # Pas de mitigation appliquée
    impact: 5  # 1-5
    probabilite: 4  # 1-5
    exposition: 5  # 1-5

    # Lifecycle
    statut: OUVERT  # OUVERT | EN_COURS | RESOLU | ACCEPTE
    date_detection: 2025-01-15
    date_echeance: 2025-01-17  # SLA 48h pour CRITIQUE
    sla: "48h"

    # Contexte
    feature: "login"
    fichiers_concernes:
      - "src/routes/auth.js:23-45"

    # Mitigations prévues
    mitigations:
      - action: "Utiliser requêtes préparées (parameterized queries)"
        statut: "PLANIFIE"
        reduction_risque_estimee: 95  # %
        responsable: "dev-team"
      - action: "Ajouter validation côté serveur (Joi/Yup)"
        statut: "PLANIFIE"
        reduction_risque_estimee: 80  # %

    # Références
    cve: null
    cwe: "CWE-89"
    owasp: "A03:2021 - Injection"
    document_source: "SEC-LOGIN.md"

  - id: RISK-LOGIN-002
    titre: "Absence de rate limiting sur endpoint login"
    description: "Pas de protection contre brute force sur /api/auth/login"

    principe_viole: "III. Sécurité dès la conception"
    controle_manquant: "Défense en profondeur"
    severite: IMPORTANT
    categorie: "Authentication"

    score_initial: 48
    score_residuel: 12  # Après mitigation partielle
    impact: 4
    probabilite: 4
    exposition: 3

    statut: EN_COURS
    date_detection: 2025-01-15
    date_echeance: 2025-01-22  # SLA 7j pour IMPORTANT
    sla: "7j"

    feature: "login"
    fichiers_concernes:
      - "src/routes/auth.js"

    mitigations:
      - action: "Implémenter express-rate-limit (5 req/min/IP)"
        statut: "EN_COURS"
        reduction_risque_estimee: 75  # %
        progression: 60
        responsable: "dev-team"

    cve: null
    cwe: "CWE-307"
    owasp: "A07:2021 - Identification and Authentication Failures"
    document_source: "SEC-LOGIN.md"

  - id: RISK-LOGIN-003
    titre: "Timing attack permet énumération des comptes"
    description: "Temps de réponse différent selon si email existe ou non"

    principe_viole: "III. Sécurité dès la conception"
    controle_manquant: "Validation systématique"
    severite: IMPORTANT
    categorie: "Information Disclosure"

    score_initial: 48
    score_residuel: 48  # Pas de mitigation
    impact: 3
    probabilite: 4
    exposition: 4

    statut: OUVERT
    date_detection: 2025-01-15
    date_echeance: 2025-01-22  # SLA 7j
    sla: "7j"

    feature: "login"
    fichiers_concernes:
      - "src/routes/auth.js:30-35"

    mitigations:
      - action: "Ajouter délai constant sur toutes les réponses login"
        statut: "PLANIFIE"
        reduction_risque_estimee: 90  # %
      - action: "Utiliser bcrypt même si user inexistant"
        statut: "PLANIFIE"
        reduction_risque_estimee: 85  # %

    cve: null
    cwe: "CWE-208"
    owasp: "A07:2021"
    document_source: "SEC-LOGIN.md"

