    titre: "Absence de tests de sécurité automatisés"
    description: "Aucun test unitaire ou SAST/DAST configuré"

    principe_viole: "IV. Tests de sécurité"
    controle_manquant: "Tests automatisés en CI/CD"
    severite: CRITIQUE  # Bloquant pour production
    categorie: "Testing"

    score_initial: 75
    score_residuel: 8  # Fortement réduit après implémentation
    impact: 5  # Impact indirect (ne détecte pas les autres risques)
    probabilite: 5
    exposition: 3

