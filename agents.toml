# OpenSecKit - Configuration des Agents AI
# Ce fichier définit les agents supportés et leur format de sortie
# Ajouter un agent = ajouter une section [agents.nom]

[meta]
version = "3.1.0"
default_agent = "claude-code"

# =============================================================================
# FORMATS DE SORTIE
# =============================================================================
# - slash-command : Un fichier par commande dans un dossier (Claude Code)
# - single-file   : Toutes les commandes dans un seul fichier (Copilot, Gemini)
# - rules-dir     : Un fichier de règles par commande (Cursor)
# - agents-md     : Format AGENTS.md standard (universel)

# =============================================================================
# AGENTS
# =============================================================================

[agents.claude-code]
name = "Claude Code"
description = "Slash commands natifs pour Claude Code CLI"
format = "slash-command"
output_dir = ".claude/commands"
file_pattern = "{command}.md"
detect_cmd = "claude"
template = "claude-code.tera"
enabled = true

[agents.copilot]
name = "GitHub Copilot"
description = "Instructions pour GitHub Copilot Chat"
format = "single-file"
output_file = ".github/copilot-instructions.md"
detect_cmd = "gh"
detect_path = ".github"
template = "copilot.tera"
enabled = true

[agents.cursor]
name = "Cursor"
description = "Règles de projet pour Cursor AI"
format = "rules-dir"
output_dir = ".cursor/rules"
file_pattern = "{command}.md"
detect_cmd = "cursor"
detect_path = ".cursor"
template = "cursor.tera"
enabled = true

[agents.gemini]
name = "Gemini"
description = "Instructions pour Google Gemini"
format = "single-file"
output_file = ".gemini/instructions.md"
detect_cmd = "gemini"
template = "gemini.tera"
enabled = true

[agents.windsurf]
name = "Windsurf"
description = "Règles Cascade pour Windsurf"
format = "rules-dir"
output_dir = ".windsurf/rules"
file_pattern = "{command}.md"
detect_cmd = "windsurf"
template = "windsurf.tera"
enabled = false  # À activer quand template prêt

[agents.aider]
name = "Aider"
description = "Configuration pour Aider"
format = "single-file"
output_file = ".aider.conf.yml"
detect_cmd = "aider"
template = "aider.tera"
enabled = false  # À activer quand template prêt

# =============================================================================
# AGENTS.md UNIVERSEL
# =============================================================================

[universal]
enabled = true
output_file = "AGENTS.md"
template = "AGENTS.md.tera"
