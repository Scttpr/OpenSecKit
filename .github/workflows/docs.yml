name: 📚 Documentation

on:
    push:
        branches: [main]
        paths:
            - "docs/**"
            - "website/mkdocs.yml"
        tags:
            - "v*"
    pull_request:
        paths:
            - "docs/**"
            - "website/mkdocs.yml"
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    validate:
        name: Validate
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/'))
        steps:
            - uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.x"

            - name: Install python-frontmatter
              run: pip install python-frontmatter

            - name: Validate Frontmatter
              run: python3 scripts/validate-frontmatter.py

    build:
        name: Build
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/')
        steps:
            - uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.x"

            - name: Install MkDocs
              run: pip install mkdocs-material

            - name: Build
              run: mkdocs build -f website/mkdocs.yml

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v4
              with:
                  path: site/

    deploy:
        name: Deploy
        runs-on: ubuntu-latest
        needs: build
        if: startsWith(github.ref, 'refs/tags/')
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
