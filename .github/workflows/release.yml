name: 🚀 Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: osk-linux-amd64
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: osk-macos-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: osk-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Binary
        working-directory: ./cli
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Asset
        shell: bash
        run: |
          BIN_PATH="cli/target/${{ matrix.target }}/release"

          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            cp "$BIN_PATH/osk.exe" "${{ matrix.asset_name }}"
          else
            cp "$BIN_PATH/osk" "${{ matrix.asset_name }}"
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.asset_name }}
