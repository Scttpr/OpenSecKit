version: 2
updates:
    - package-ecosystem: "cargo"
      directory: "/cli"
      schedule:
          interval: "weekly"
          day: "monday"
      commit-message:
          prefix: "deps(rust)"
      labels:
          - "dependencies"
          - "rust"
      open-pull-requests-limit: 5

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
      commit-message:
          prefix: "deps(actions)"
      labels:
          - "dependencies"
          - "ci"
      open-pull-requests-limit: 3

    - package-ecosystem: "pip"
      directory: "/"
      schedule:
          interval: "monthly"
      commit-message:
          prefix: "deps(python)"
      labels:
          - "dependencies"
          - "python"
