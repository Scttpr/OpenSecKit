# ==============================================================================
# GDPR CONTEXT CONFIGURATION - GENERATED SKELETON
# ==============================================================================

# --- SECTION 1: IDENTITY ---
# INSTRUCTION POUR L'AGENT : Cherche dans le README.md, LICENSE, ou package.json
organization:
  legal_name: "<EXTRACT: Nom légal de l'entité depuis LICENSE ou footer du site>"
  address: "<EXTRACT: Adresse trouvée dans SECURITY.md ou contact page>"
  contact_email: "<EXTRACT: Email de sécurité ou support technique>"
  # Si l'entreprise est hors UE, chercher un représentant
  eu_representative:
    name: "<UNKNOWN: À remplir par l'humain si non trouvé>"
    email: "<UNKNOWN>"

# --- SECTION 2: GOVERNANCE ---
# INSTRUCTION POUR L'AGENT : Ces infos sont rarement dans le code.
# Mettre des placeholders explicites pour l'humain.
governance:
  dpo:
    name: "<HUMAN_INPUT_REQUIRED: Nom du DPO>"
    email: "<HUMAN_INPUT_REQUIRED: Email du DPO>"
  supervisory_authority:
    name: "<INFER: Basé sur l'adresse de l'organisation (ex: France -> CNIL)>"

# --- SECTION 3: SECURITY MEASURES (TOMs) ---
# INSTRUCTION POUR L'AGENT : Analyse Terraform (main.tf), Dockerfiles, ou Configs Cloud
security_measures:
  encryption_at_rest:
    enabled: "<BOOLEAN: Vérifier 'sse_algorithm' ou 'encryption'>"
    standard: "<EXTRACT: ex: AES-256>"
    # Lister les ressources chiffrées trouvées (S3, RDS, EBS)
    scope: 
      - "<LIST: Ressources détectées comme chiffrées>"
  
  encryption_in_transit:
    enabled: "<BOOLEAN: Vérifier config HTTPS, SSL policies, TLS version>"
    standard: "<EXTRACT: ex: TLS 1.2+>"

  access_control:
    # Chercher des configs Auth0, Keycloak, AWS IAM policies
    mfa_required: "<UNKNOWN: Vérifier politiques IAM>"
    sso_enabled: "<BOOLEAN: Présence de SAML/OIDC dans le code>"

  backups:
    # Chercher des politiques de backup AWS Backup, scripts cron, etc.
    enabled: "<BOOLEAN>"
    frequency: "<EXTRACT: Déduire de la cron schedule ou retention policy>"

# --- SECTION 4: PROCESSORS (SOUS-TRAITANTS) ---
# INSTRUCTION POUR L'AGENT : Analyse package.json, go.mod, requirements.txt
# pour trouver des SDKs tiers (Stripe, SendGrid, AWS, Google Analytics, Sentry).
processors:
  # Répéter ce bloc pour chaque service tiers détecté
  - name: "<DETECTED_VENDOR: ex: Stripe>"
    role: "<INFER: ex: Payment Processing (basé sur le nom du package)>"
    # L'agent doit utiliser sa base de connaissance pour déduire la location
    location: "<KNOWLEDGE: ex: USA>" 
    # Si USA, suggérer le mécanisme de transfert probable
    transfer_mechanism: "<SUGGEST: ex: DPF ou CCT>"

# --- SECTION 5: DATA MAPPING ---
# INSTRUCTION POUR L'AGENT : Analyse les modèles de base de données (Prisma, Mongoose, SQL schema)
# ou les classes DTO/Entities.
processing_activities:
  - id: "AUTO-GEN-001"
    name: "Application Core Processing"
    # Lister les champs sensibles trouvés (password, email, phone, credit_card)
    data_categories: 
      - "<LIST_DETECTED_FIELDS>"
    # Déduire le type d'utilisateur (User, Admin, Customer)
    data_subjects: 
      - "<INFER_FROM_CODE>"