# =============================================================================
# OpenSecKit - Contexte Projet RGS (Référentiel Général de Sécurité)
# =============================================================================
#
# Ce fichier capture les informations organisationnelles nécessaires pour :
# - Générer le dossier d'homologation RGS
# - Exécuter l'audit de conformité `osk-audit rgs`
# - Personnaliser les templates de sécurité
#
# Les informations techniques (stack, architecture) sont détectées automatiquement
# par OSK dans `docs/context/meta.md`. Ce fichier complète avec les données
# organisationnelles non-détectables.
#
# Usage :
#   1. Copier ce fichier dans votre projet : `cp skeleton.yaml .osk/rgs-context.yaml`
#   2. Compléter les sections marquées [À COMPLÉTER]
#   3. Lancer `osk-audit rgs` pour vérifier la conformité
#
# =============================================================================

version: "1.0.0"
domain: "gouvernement-rgs"
schema_version: "2025-01"

# =============================================================================
# SECTION 1 : IDENTIFICATION DU SYSTÈME
# =============================================================================
# Informations administratives pour le dossier d'homologation (Section 1)

systeme:
  # Nom officiel du système d'information
  nom: "[À COMPLÉTER - ex: Portail de téléprocédures administratives]"

  # Code/identifiant interne
  code: "[À COMPLÉTER - ex: PTPA-2025]"

  # Version majeure du système
  version: "[À COMPLÉTER - ex: 2.0.0]"

  # Description courte (1-2 phrases)
  description: "[À COMPLÉTER - ex: Plateforme permettant aux citoyens d'effectuer leurs démarches administratives en ligne]"

  # URL de production (si applicable)
  url_production: "[À COMPLÉTER - ex: https://demarches.example.gouv.fr]"

  # Date de mise en service prévue/effective
  date_mise_en_service: "[À COMPLÉTER - ex: 2025-06-01]"

# =============================================================================
# SECTION 2 : CLASSIFICATION RGS
# =============================================================================
# Niveau de sécurité requis et justification

classification:
  # Niveau RGS cible
  # Options: RGS* | RGS** | RGS***
  niveau_rgs: "[À COMPLÉTER - ex: RGS**]"

  # Justification du niveau choisi
  justification: "[À COMPLÉTER - ex: Traitement de données personnelles sensibles (fiscalité)]"

  # Classification des données traitées
  # Options: DCP (Public) | DR (Diffusion Restreinte) | NP (Non Protégé mais sensible)
  classification_donnees: "[À COMPLÉTER - ex: DR]"

  # Le système traite-t-il des données de santé (HDS) ?
  donnees_sante: false

  # Le système est-il un OIV (Opérateur d'Importance Vitale) ?
  oiv: false

  # Le système est-il soumis à NIS2 ?
  nis2: false

# =============================================================================
# SECTION 3 : BESOINS DE SÉCURITÉ (DICP)
# =============================================================================
# Évaluation des besoins selon les 4 critères DICP
# Échelle : 0 (aucun) | 1 (faible) | 2 (moyen) | 3 (fort) | 4 (très fort)

besoins_securite:
  disponibilite:
    niveau: 3 # [À AJUSTER]
    justification: "[À COMPLÉTER - ex: Service public 24/7, interruption > 4h inacceptable]"
    sla_disponibilite: "99.5%" # Objectif de disponibilité
    rto_heures: 4 # Recovery Time Objective
    rpo_heures: 1 # Recovery Point Objective

  integrite:
    niveau: 4 # [À AJUSTER]
    justification: "[À COMPLÉTER - ex: Données officielles, toute altération = non-conformité légale]"

  confidentialite:
    niveau: 4 # [À AJUSTER]
    justification: "[À COMPLÉTER - ex: Données personnelles sensibles (RGPD), secret professionnel]"

  preuve:
    niveau: 3 # [À AJUSTER]
    justification: "[À COMPLÉTER - ex: Traçabilité requise pour audits, opposabilité juridique]"
    duree_conservation_logs_annees: 3 # Minimum RGS

# =============================================================================
# SECTION 4 : ORGANISATION ET RESPONSABILITÉS
# =============================================================================
# Acteurs clés pour l'homologation

organisation:
  # Entité responsable du système
  entite_responsable:
    nom: "[À COMPLÉTER - ex: Direction du Numérique]"
    siret: "[À COMPLÉTER - ex: 12345678901234]"
    adresse: "[À COMPLÉTER]"

  # Autorité d'homologation (signataire de la décision)
  autorite_homologation:
    nom: "[À COMPLÉTER - ex: Jean Martin]"
    fonction: "[À COMPLÉTER - ex: Directeur Général]"
    email: "[À COMPLÉTER]"
    telephone: "[À COMPLÉTER]"

  # Responsable de la Sécurité des Systèmes d'Information
  rssi:
    nom: "[À COMPLÉTER]"
    email: "[À COMPLÉTER]"
    telephone: "[À COMPLÉTER]"

  # Maîtrise d'Ouvrage (MOA)
  moa:
    nom: "[À COMPLÉTER]"
    email: "[À COMPLÉTER]"
    service: "[À COMPLÉTER - ex: Direction Métier]"

  # Maîtrise d'Œuvre (MOE)
  moe:
    nom: "[À COMPLÉTER]"
    email: "[À COMPLÉTER]"
    service: "[À COMPLÉTER - ex: DSI]"

  # Délégué à la Protection des Données (DPO)
  dpo:
    nom: "[À COMPLÉTER]"
    email: "[À COMPLÉTER]"

  # Exploitant (hébergeur, infogérant)
  exploitant:
    nom: "[À COMPLÉTER - ex: OVH, Scalingo, interne]"
    type: "[À COMPLÉTER - ex: Cloud SecNumCloud | Cloud EU | On-premise]"
    contact: "[À COMPLÉTER]"

# =============================================================================
# SECTION 5 : PÉRIMÈTRE DU SYSTÈME
# =============================================================================
# Définition du scope de l'homologation

perimetre:
  # Composants inclus dans le périmètre d'homologation
  inclus:
    - "[À COMPLÉTER - ex: Application web frontend (React)]"
    - "[À COMPLÉTER - ex: API backend (Python/FastAPI)]"
    - "[À COMPLÉTER - ex: Base de données PostgreSQL]"
    - "[À COMPLÉTER - ex: Service d'authentification FranceConnect]"

  # Composants explicitement exclus
  exclus:
    - "[À COMPLÉTER - ex: Infrastructure hébergeur (responsabilité OVH)]"
    - "[À COMPLÉTER - ex: Postes de travail des agents]"
    - "[À COMPLÉTER - ex: Réseau interne de l'administration]"

  # Interfaces avec systèmes externes
  interfaces_externes:
    - nom: "FranceConnect"
      type: "Authentification"
      protocole: "OpenID Connect"
      niveau_confiance: "eIDAS Substantial"

    - nom: "[À COMPLÉTER - ex: API Entreprise]"
      type: "[À COMPLÉTER]"
      protocole: "[À COMPLÉTER - ex: REST/HTTPS]"
      niveau_confiance: "[À COMPLÉTER]"

  # Nombre d'utilisateurs estimés
  volumetrie:
    utilisateurs_internes: "[À COMPLÉTER - ex: 50]"
    utilisateurs_externes: "[À COMPLÉTER - ex: 100000]"
    transactions_jour: "[À COMPLÉTER - ex: 5000]"

# =============================================================================
# SECTION 6 : FONCTIONS DE SÉCURITÉ RGS
# =============================================================================
# Mécanismes de sécurité par fonction RGS

fonctions_securite:
  # Fonction 1 : Identification et Authentification (Annexe B2)
  authentification:
    methode_principale: "[À COMPLÉTER - ex: FranceConnect]"
    niveau_eidas: "[À COMPLÉTER - ex: Substantial]"
    mfa_actif: true
    politique_mdp:
      longueur_min: 16
      complexite: true
      expiration_jours: 90
      historique: 5
    verrouillage:
      tentatives_max: 5
      duree_minutes: 30

  # Fonction 2 : Intégrité (Annexe B3)
  integrite:
    signature_documents: "[À COMPLÉTER - ex: PAdES-B-LTA]"
    horodatage_qualifie: true
    tsa_url: "[À COMPLÉTER - ex: https://timestamp.certinomis.com]"
    psce_signature: "[À COMPLÉTER - ex: Certinomis]"
    hash_algorithm: "SHA-384"

  # Fonction 3 : Confidentialité (Annexe B4)
  confidentialite:
    chiffrement_repos: "AES-256-GCM"
    chiffrement_transit: "TLS 1.3"
    gestion_cles: "[À COMPLÉTER - ex: AWS KMS | HashiCorp Vault | HSM]"
    certificat_tls:
      autorite: "[À COMPLÉTER - ex: Let's Encrypt | Certinomis]"
      algorithme: "ECDSA P-384"
      expiration: "[À COMPLÉTER]"

  # Fonction 4 : Traçabilité (Annexe B5)
  tracabilite:
    format_logs: "JSON structuré"
    siem: "[À COMPLÉTER - ex: Elasticsearch | Splunk | DataDog]"
    retention_jours: 1095 # 3 ans minimum
    horodatage: "NTP synchronisé"
    protection_logs: "[À COMPLÉTER - ex: WORM | Chaînage crypto]"

# =============================================================================
# SECTION 7 : HOMOLOGATION
# =============================================================================
# Informations sur le processus d'homologation

homologation:
  # Statut actuel
  # Options: NON_DEMARRE | EN_COURS | HOMOLOGUE | EXPIRE | RENOUVELLEMENT
  statut: "NON_DEMARRE"

  # Dates clés
  dates:
    debut_etude: "[À COMPLÉTER]"
    revue_rssi: "[À COMPLÉTER]"
    commission_homologation: "[À COMPLÉTER]"
    decision_prevue: "[À COMPLÉTER]"

  # Durée de validité de l'homologation
  # Options: 3 | 5 (années)
  duree_validite_annees: 3

  # Conditions de l'homologation (si déjà homologué)
  conditions:
    - "[À COMPLÉTER - ex: Mise en place du MFA avant le 01/03/2025]"
    - "[À COMPLÉTER - ex: Audit de pénétration annuel]"

  # Risques résiduels acceptés
  risques_residuels_acceptes:
    - id: "[À COMPLÉTER - ex: RR-001]"
      description: "[À COMPLÉTER]"
      niveau: "[À COMPLÉTER - ex: Moyen]"
      justification_acceptation: "[À COMPLÉTER]"

# =============================================================================
# SECTION 8 : FOURNISSEURS ET SOUS-TRAITANTS
# =============================================================================
# Chaîne de confiance (supply chain)

fournisseurs:
  - nom: "[À COMPLÉTER - ex: OVH]"
    type: "Hébergement"
    localisation: "[À COMPLÉTER - ex: France (Roubaix)]"
    certifications:
      - "SecNumCloud"
      - "ISO 27001"
      - "HDS"
    dpa_signe: true # Data Processing Agreement RGPD
    contact_securite: "[À COMPLÉTER]"

  - nom: "[À COMPLÉTER - ex: Prestataire développement]"
    type: "Développement"
    localisation: "[À COMPLÉTER]"
    certifications: []
    dpa_signe: true
    contact_securite: "[À COMPLÉTER]"

# =============================================================================
# SECTION 9 : DOCUMENTS DE RÉFÉRENCE
# =============================================================================
# Liens vers les documents du dossier d'homologation

documents:
  # Documents générés par OSK (dans docs/security/)
  osk:
    analyse_risques: "docs/security/risks/risk-register.yaml"
    analyses_features: "docs/security/features/SEC-*.md"
    meta_projet: "docs/context/meta.md"

  # Documents externes (à fournir manuellement)
  externes:
    ebios_rm: "[À COMPLÉTER - chemin ou lien]"
    rapport_pentest: "[À COMPLÉTER - chemin ou lien]"
    pra_pca: "[À COMPLÉTER - chemin ou lien]" # Plan de Reprise/Continuité d'Activité
    politique_securite: "[À COMPLÉTER - chemin ou lien]"
    contrats_dpa: "[À COMPLÉTER - chemin ou lien]"

# =============================================================================
# SECTION 10 : MAINTIEN EN CONDITION DE SÉCURITÉ (MCS)
# =============================================================================
# Procédures post-homologation

mcs:
  # Fréquence des revues de sécurité
  revue_securite:
    frequence: "Trimestrielle"
    responsable: "[À COMPLÉTER - ex: RSSI]"

  # Audit de pénétration
  pentest:
    frequence: "Annuelle"
    prestataire: "[À COMPLÉTER - ex: Wavestone]"
    dernier_audit: "[À COMPLÉTER]"
    prochain_audit: "[À COMPLÉTER]"

  # Gestion des vulnérabilités
  vulnerabilites:
    scan_frequence: "Hebdomadaire"
    outil: "[À COMPLÉTER - ex: Trivy | Snyk | Qualys]"
    sla_critique_heures: 48
    sla_haute_jours: 7
    sla_moyenne_jours: 30

  # Gestion des incidents
  incidents:
    contact_astreinte: "[À COMPLÉTER]"
    procedure_notification_anssi: true # Obligatoire pour OIV/NIS2
    delai_notification_heures: 72 # RGPD : 72h max

  # Sensibilisation
  sensibilisation:
    frequence: "Annuelle"
    derniere_session: "[À COMPLÉTER]"
    taux_completion: "[À COMPLÉTER - ex: 95%]"

# =============================================================================
# MÉTADONNÉES
# =============================================================================

metadata:
  cree_le: "[DATE CRÉATION]"
  modifie_le: "[DATE MODIFICATION]"
  version_document: "1.0"
  auteur: "[À COMPLÉTER]"
  statut: "BROUILLON" # BROUILLON | VALIDE | ARCHIVE
